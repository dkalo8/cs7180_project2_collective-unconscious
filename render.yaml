services:
  # Backend API
  - type: web
    name: collective-unconscious-api
    runtime: node
    rootDir: server
    buildCommand: npm install && npx prisma generate
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: collective-unconscious-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: CLIENT_URL
        fromService:
          type: static
          name: collective-unconscious-ui
          property: host

  # Frontend UI
  - type: static_site
    name: collective-unconscious-ui
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: collective-unconscious-api
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: collective-unconscious-db
    plan: free
