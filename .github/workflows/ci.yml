name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: collective_unconscious
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/collective_unconscious?schema=public

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'

    # SETUP
    - name: Root - Install Dependencies
      run: npm ci

    - name: Prisma - Generate Client
      run: npx prisma generate

    - name: Prisma - Migrate DB
      run: npx prisma migrate deploy

    - name: Server - Lint
      run: cd server && npm run lint

    - name: Server - Test
      run: cd server && npm run test

    # CLIENT
    - name: Client - Lint
      run: cd client && npm run lint

    - name: Client - Test
      run: cd client && npm run test

    - name: Client - Build
      run: cd client && npm run build
