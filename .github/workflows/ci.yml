name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-audit:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'

    # SERVER
    - name: Server - Install Dependencies
      run: cd server && npm ci

    - name: Server - Lint
      run: cd server && npm run lint

    - name: Server - Security Audit
      run: cd server && npm audit --audit-level=critical

    # CLIENT
    - name: Client - Install Dependencies
      run: cd client && npm ci

    - name: Client - Lint
      run: cd client && npm run lint

    - name: Client - Security Audit
      run: cd client && npm audit --audit-level=critical

  test-and-coverage:
    runs-on: ubuntu-latest
    needs: lint-and-audit

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'

    - name: Server - Install Dependencies
      run: cd server && npm ci

    - name: Generate Prisma Client
      run: cd server && npx prisma generate

    - name: Server - Test & Coverage
      run: cd server && npm run test:coverage || true

    - name: Client - Install Dependencies
      run: cd client && npm ci

    - name: Client - Test & Coverage
      run: cd client && npm run test:coverage

    - name: Client - Build
      run: cd client && npm run build
